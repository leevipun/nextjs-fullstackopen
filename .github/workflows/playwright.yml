name: End-to-End Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Set up environment files
        run: |
          cat > .env.test << EOF
          DATABASE_URL=${{ secrets.DATABASE_URL }}
          NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
          NEXTAUTH_URL=${{ secrets.NEXTAUTH_URL }}
          NODE_ENV=test
          EOF
          cp .env.test .env.local

      - name: Verify environment setup
        run: |
          echo "Checking .env.test file:"
          cat .env.test | sed 's/=.*/=***/' 
          echo ""
          echo "Checking .env.local file:"
          cat .env.local | sed 's/=.*/=***/' 
          echo ""
          echo "DATABASE_URL secret exists: ${{ secrets.DATABASE_URL != '' }}"
          echo "NEXTAUTH_SECRET secret exists: ${{ secrets.NEXTAUTH_SECRET != '' }}"
          echo "NEXTAUTH_URL secret exists: ${{ secrets.NEXTAUTH_URL != '' }}"

      - name: Run database migrations
        run: npx drizzle-kit push
        env:
          NODE_ENV: test

      - name: Run Playwright tests
        run: npx playwright test

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
